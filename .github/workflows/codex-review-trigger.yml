name: codex-review-trigger

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  request-review:
    name: request-codex-review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Ensure @codex review comment exists
        uses: actions/github-script@v7
        with:
          script: |
            const markerPrefix = '<!-- codex-review-trigger:head=';
            const mention = '@codex review';
            const issueNumber = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const headSha = context.payload.pull_request.head.sha;
            const marker = `${markerPrefix}${headSha} -->`;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              }
            );

            // Retrigger review for each new PR head commit by tracking marker+SHA.
            const hasMentionForHead = comments.some((comment) =>
              typeof comment.body === 'string' &&
              comment.body.includes(marker)
            );

            if (hasMentionForHead) {
              core.info(`Found existing @codex review comment for head ${headSha}.`);
              return;
            }

            const body = `${marker}\n${mention} for regressions in correctness, reliability, security, and cost.\n\nContext:\n- Follow CHARTER.md and AGENTS.md\n- Prioritize P0/P1 findings\n- Flag behavior regressions and missing tests`;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body,
            });
